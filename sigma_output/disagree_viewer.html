<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RfA Disagreement Graph</title>
  <style>
    html, body, #container { margin:0; padding:0; width:100%; height:100vh; overflow:hidden; font-family:Arial,sans-serif; }
    #panel {
      position:absolute; top:12px; left:12px; z-index:10;
      background:rgba(255,255,255,0.93); padding:12px 16px;
      border-radius:10px; font-size:13px; max-width:260px;
      box-shadow:0 2px 8px rgba(0,0,0,0.15);
    }
    #panel h3 { margin:0 0 8px 0; font-size:14px; }
    #tooltip {
      position:absolute; display:none; z-index:20;
      background:rgba(0,0,0,0.82); color:#fff;
      padding:8px 12px; border-radius:7px; font-size:12px;
      pointer-events:none; line-height:1.6;
    }
  </style>
</head>
<body>
  <div id="panel">
    <h3>RfA Disagreement Graph</h3>
    <div>Top-120 voters by disagreement degree.<br>Node colour = agreement community.<br>Edge colour intensity = disagreement strength.<br>Hover a node for details.</div>
  </div>
  <div id="tooltip"></div>
  <div id="container"></div>

  <script type="module">
    import Graph from "https://cdn.jsdelivr.net/npm/graphology@0.26.0/+esm";
    import Sigma from "https://cdn.jsdelivr.net/npm/sigma@3.0.2/+esm";

    const resp = await fetch("./disagree_graph.json");
    const data = await resp.json();

    const graph = new Graph({ type: "undirected" });

    for (const n of data.nodes) {
      graph.addNode(n.key, {
        label: n.label, x: n.x, y: n.y,
        size: n.size, color: n.color,
        community: n.community, degree: n.degree
      });
    }

    for (const e of data.edges) {
      try {
        graph.addEdge(e.source, e.target, {
          size: e.size, color: e.color,
          normalized: e.normalized, count: e.count
        });
      } catch(_) {}
    }

    const renderer = new Sigma(graph, document.getElementById("container"), {
      renderEdgeLabels: false,
    });

    const tooltip = document.getElementById("tooltip");

    renderer.on("enterNode", ({ node }) => {
      const attr = graph.getNodeAttributes(node);
      tooltip.innerHTML =
        `<strong>${node}</strong><br>` +
        `Agreement community: ${attr.community === -1 ? "unknown" : attr.community}<br>` +
        `Disagreement degree: ${attr.degree}`;
      tooltip.style.display = "block";
    });

    renderer.on("leaveNode", () => { tooltip.style.display = "none"; });

    document.getElementById("container").addEventListener("mousemove", e => {
      tooltip.style.left = (e.clientX + 14) + "px";
      tooltip.style.top  = (e.clientY + 14) + "px";
    });
  </script>
</body>
</html>
